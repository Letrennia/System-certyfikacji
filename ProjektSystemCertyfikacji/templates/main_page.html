<!-- 
INFORMACJE DLA FRONTENDU:

DANE W SZABLONIE:
- {{ total_certificates }}, {{ active_certificates }}, {{ total_batches }}, {{ active_alerts }}
- {{ recent_certificates }} - lista certyfikatów, każdy ma:
  * obiekt certyfikatu (.certificate_number, .certificate_type, .status)
  * token, detail_url, report_url (gotowe linki)
- {{ recent_alerts }} - lista alertów
- {{ blockchain_status }} - status blockchain

API ENDPOINTY (wszystkie pod /api/):
1. GET    /system-stats/                     - statystyki systemu
2. POST   /verify-qr-code/                   - weryfikacja QR 
3. GET    /track-product/?batch_id=X         - śledzenie produktu
4. POST   /submit-rating/                    - oceny 
5. POST   /submit-fraud-report/              - zgłoszenia 
6. GET    /certificate-details/?certificate_id=X - szczegóły certyfikatu

WAŻNE:
- POST wymaga CSRF token: headers: {'X-CSRFToken': csrftoken, 'Content-Type': 'application/json'}
- Endpointy można testować w przeglądarce (np. /api/system-stats/)
- Certyfikaty mają gotowe linki: detail_url, report_url
-->

<body>
    <header>
        <a href="{% url 'login' %}">Zaloguj się</a>
        <br>
        <a href="{% url 'register' %}">Zarejestruj się</a>
    </header>
</body>


<h2>Wyszukaj certyfikat</h2>

<input
    type="text"
    id="certificate_number"
    placeholder="Wpisz numer certyfikatu"
>

<button onclick="searchCertificate()">Szukaj</button>

<hr>

<div id="result"></div>



<script>
function searchCertificate() {
    const number = document.getElementById('certificate_number').value.trim();

    if (!number) {
        alert('Podaj numer certyfikatu');
        return;
    }

    fetch(`/api/certificate-details/?certificate_number=${encodeURIComponent(number)}`)
        .then(response => response.json())
        .then(data => {
            if (!data.success) {
                document.getElementById('result').innerHTML =
                    `<p style="color:red">${data.error}</p>`;
                return;
            }

            const c = data.certificate;

            document.getElementById('result').innerHTML = `
                <h3>Certyfikat ${c.number}</h3>
                <p><b>Status:</b> ${c.status}</p>
                <p><b>Typ:</b> ${c.type}</p>
                <p><b>Wydawca:</b> ${c.publisher}</p>
                <p><b>Ważny od:</b> ${c.valid_from}</p>
                <p><b>Ważny do:</b> ${c.valid_to}</p>
                <p><b>Blockchain:</b> ${c.blockchain_verified ? ' zweryfikowany' : ' brak'}</p>

                <h4>Oceny (${data.ratings.total})</h4>
                <p>Średnia: ${data.ratings.average.toFixed(1)}</p>

                <h4>Partie produktu (${data.batches.total})</h4>
                <ul>
                    ${data.batches.list.map(b =>
                        `<li>${b.name} (${b.category}) – ${b.status}</li>`
                    ).join('')}
                </ul>
            `;
        })
        .catch(err => {
            console.error(err);
            document.getElementById('result').innerHTML =
                `<p>Błąd połączenia</p>`;
        });
}
</script>
