{% block content %}

{% if messages %}
  <ul>
    {% for message in messages %}
      <li 
        {% if message.tags %} class="{{ message.tags }}" {% endif %}
      >
        {{ message }}
      </li>
    {% endfor %}
  </ul>
{% endif %}


<form method="post">
    {% csrf_token %}
    <h2>Logowanie</h2>
        {{form.as_p}}
    <input type="submit" value="Zaloguj się">
    <a href="{% url 'register' %}">Zarejestruj się</a>
</form>

{% endblock content %}
