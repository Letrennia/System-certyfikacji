{% block content %}

<form method="post">
    {% csrf_token %}
    <h2>Rejestracja</h2>
    {% for field in form %}
    <p>    
        {% if field.errors %}
        <ul class="errorlist">
            {% for error in field.errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
        {% endif %}
    {{ field.label_tag }} {{ field }}
    </p>
    {% endfor %}
    <input type="submit" value="Register">
</form>

{% endblock content %}
