{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Błąd - System Certyfikacji</title>
    <link href="https://fonts.googleapis.com/css?family=Inter|Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'ProjektSystemCertyfikacji/styles.css' %}">
    <style>
        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes revealDown {
            from { opacity: 0; transform: translateY(-14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pageExit {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-12px); }
        }
        @keyframes shakeSoft {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20%  { transform: translateX(-5px) rotate(-2deg); }
            40%  { transform: translateX(5px)  rotate(2deg); }
            60%  { transform: translateX(-4px) rotate(-1deg); }
            80%  { transform: translateX(4px)  rotate(1deg); }
        }
        .page-wrapper {
            animation: pageEnter 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .page-wrapper.exiting {
            animation: pageExit 0.3s ease-in forwards;
            pointer-events: none;
        }
        .stagger-child {
            opacity: 0;
            animation: revealDown 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: var(--delay, 0s);
        }

        .container {
            max-width: 600px;
            margin: 100px auto;
            padding: 0 24px;
            text-align: center;
        }
        .error-card {
            background-color: #fff;
            border: 1px solid #f5c2c7;
            border-radius: 12px;
            padding: 48px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
            opacity: 0;
            animation: revealDown 0.4s ease-out 0.1s both,
                       shakeSoft 0.7s ease-in-out 0.55s both;
        }
        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #842029;
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 16px;
            color: #757575;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn-home {
            padding: 14px 32px;
            background-color: #77c320;
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-home:hover {
            background-color: #5aa000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    {% include "navbars/company_navbar.html" %}

    <main class="main-content centered">
        <div class="page-wrapper">
            <div class="container">
                <div class="error-card stagger-child" style="--delay:.08s">
                    <h1 class="error-title stagger-child" style="--delay:.22s">Błąd dostępu</h1>
                    <p class="error-message stagger-child" style="--delay:.34s">{{ msg }}</p>
                    <a href="/" class="btn-home stagger-child" style="--delay:.46s">Powrót do strony głównej</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer top-margin-large">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Produkty i certyfikaty</h3>
                <div class="footer-links">
                    <a href="/" class="footer-link">Wyszukaj produkt</a>
                    <a href="#" class="footer-link">Certyfikaty BIO/EKO</a>
                </div>
            </div>
            <div class="footer-section">
                <h3>Dokumentacja</h3>
                <div class="footer-links">
                    <a href="#" class="footer-link">FAQ</a>
                    <a href="mailto:89207@student.pb.edu.pl" target="_blank" class="footer-link">Pomoc techniczna</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
    document.addEventListener('click', function(e) {
        const link = e.target.closest('a[href]');
        if (!link) return;
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') ||
            href.startsWith('mailto') || link.target === '_blank') return;
        e.preventDefault();
        const wrapper = document.querySelector('.page-wrapper');
        if (wrapper) {
            wrapper.classList.add('exiting');
            setTimeout(() => { window.location.href = href; }, 280);
        } else {
            window.location.href = href;
        }
    });
    </script>
</body>
</html>
