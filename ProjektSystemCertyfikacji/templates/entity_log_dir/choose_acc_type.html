{% extends "base_sans.html" %}
{% load static %}

{% block content %}
    <style>
        .main-content {
            background: linear-gradient(270deg, #f5f7fa, #e0f2f1, #fff9c4);
            background-size: 600% 600%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .choice-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .choice-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 48px;
        }

        .choice-card {
            background-color: white;
            border: 2px solid #d9d9d9;
            border-radius: 12px;
            padding: 48px 32px;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .choice-card:hover {
            border-color: #2c2c2c;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }

        .choice-icon {
            font-size: 64px;
            margin-bottom: 8px;
        }

        .choice-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e1e1e;
            margin-bottom: 8px;
        }

        .choice-description {
            font-size: 14px;
            color: #757575;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .choice-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <main class="main-content">
        <div class="choice-container">
            <h1 class="main-title">Wybierz Typ Konta</h1>
            <p class="main-subtitle">Wybierz odpowiedni rodzaj rejestracji</p>

            <div class="choice-cards">
                <a href="/register" class="choice-card">
                    <div class="choice-icon">🏢</div>
                    <div class="choice-title">Jednostka Certyfikująca</div>
                    <div class="choice-description">
                        Dla jednostek wydających certyfikaty ekologiczne
                    </div>
                </a>

                <a href="/register_company" class="choice-card">
                    <div class="choice-icon">🌾</div>
                    <div class="choice-title">Producent</div>
                    <div class="choice-description">
                        Dla producentów i przetwórców produktów ekologicznych
                    </div>
                </a>
            </div>
        </div>
    </main>
{% endblock %}
