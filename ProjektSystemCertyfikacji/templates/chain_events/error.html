{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Błąd - System Certyfikacji</title>
    <link href="https://fonts.googleapis.com/css?family=Inter|Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'ProjektSystemCertyfikacji/styles.css' %}">
    <style>
        .container {
            max-width: 600px;
            margin: 120px auto 32px;
            padding: 0 24px;
            text-align: center;
        }
        .error-icon { font-size: 64px; margin-bottom: 24px; }
        h1.main-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e1e1e;
            margin-bottom: 12px;
        }
        .error-msg {
            font-size: 16px;
            color: #757575;
            margin-bottom: 36px;
            padding: 16px 20px;
            background-color: #f8d7da;
            border: 1px solid #f5c2c7;
            border-radius: 10px;
            color: #842029;
        }
        .btn-back {
            padding: 13px 28px;
            background-color: #77c320;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .btn-back:hover { background-color: #5aa000; }
    </style>
</head>
<body>
    {% include "navbars/certifying_unit_navbar.html" %}

    <main class="main-content centered">
        <div class="container">
            <div class="error-icon">X</div>
            <h1 class="main-title">Brak dostępu</h1>
            <div class="error-msg">{{ msg }}</div>
            <a href="{% url 'list_product_batches' %}" class="btn-back">← Wróć do listy partii</a>
        </div>
    </main>
</body>
</html>
