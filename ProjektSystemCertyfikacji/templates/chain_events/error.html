{% extends "base.html" %}

{% block title %}Błąd dostępu - System Certyfikacji{% endblock %}

{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
    .main-content {
        position: relative;
        background-color: #f5f7f0;
        box-shadow: inset 0 15px 15px -15px rgba(0,0,0,0.25);
    }

    @keyframes shakeSoft {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        20%  { transform: translateX(-6px) rotate(-2deg); }
        40%  { transform: translateX(6px) rotate(2deg); }
        60%  { transform: translateX(-4px) rotate(-1deg); }
        80%  { transform: translateX(4px) rotate(1deg); }
    }

    .error-wrapper {
        max-width: 520px;
        margin: 0 auto;
        padding-top: 40px;
        text-align: center;
    }
    .error-card {
        background: rgba(255,255,255,0.85); backdrop-filter: blur(4px);
        border: 1px solid rgba(248,215,218,0.8); border-radius: 24px;
        padding: 56px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .error-icon {
        font-size: 80px; display: block; margin-bottom: 24px; line-height: 1;
        animation: shakeSoft 0.7s ease-in-out 0.4s both;
    }
    .error-title {
        font-family: 'Caveat', cursive; font-size: 3.5rem; font-weight: 700;
        color: #842029; margin-bottom: 16px; line-height: 1.1;
    }
    .error-message {
        font-size: 16px; color: #4d6b4d; margin-bottom: 36px;
        line-height: 1.6; font-family: 'Inter', sans-serif;
    }
    .btn-back {
        display: inline-block; padding: 13px 36px; border-radius: 40px;
        font-size: 15px; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
        background-color: #77c320; color: white; text-decoration: none; font-weight: 600;
        box-shadow: 0 8px 16px rgba(119,195,32,0.2);
        transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .btn-back:hover {
        background-color: #8fd43b; box-shadow: 0 4px 14px rgba(119,195,32,0.35);
        transform: translateY(-1px);
    }
    .btn-secondary {
        display: inline-block; margin-top: 14px; padding: 10px 24px; border-radius: 40px;
        font-size: 14px; border: 2px solid #c0ccb0; cursor: pointer;
        font-family: 'Inter', sans-serif; background-color: rgba(255,255,255,0.8);
        color: #4d6b4d; text-decoration: none; font-weight: 500;
        transition: border-color 0.2s, background-color 0.2s;
    }
    .btn-secondary:hover { border-color: #77c320; background-color: #ffffff; }

    @media (max-width: 480px) {
        .error-card { padding: 40px 20px; }
        .error-title { font-size: 2.5rem; }
    }
</style>
{% endblock %}

{% block content %}
<div class="error-wrapper">
    <div class="error-card">
        <h1 class="error-title">Brak dostępu</h1>
        <p class="error-message">{{ msg }}</p>
        <a href="{% url 'list_product_batches' %}" class="btn-back">← Wróć do listy partii</a>
        <br>
        <a href="javascript:history.back()" class="btn-secondary">Cofnij</a>
    </div>
</div>
{% endblock %}
